# =====================================================================
# FormReminder - NGINX config
# Place this file at: frontend/nginx.conf
# =====================================================================

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets normally
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other routes fall back to index.html so React Router can handle them.
    # Without this, refreshing /dashboard or navigating directly to a deep URL
    # returns a 404 from NGINX instead of loading the React app.
    location / {
        try_files $uri $uri/ /index.html;
    }
}